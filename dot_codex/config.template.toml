model = "gpt-5.5"
model_reasoning_effort = "medium"
personality = "pragmatic"
default_permissions = ":danger-full-access"
notify = ["python3", "/home/kotek/.codex/scripts/notify-ubuntu.py"]
show_raw_agent_reasoning = true
check_for_update_on_startup = false

[notice]
hide_gpt5_1_migration_prompt = true
"hide_gpt-5.1-codex-max_migration_prompt" = true
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"

[features]
unified_exec = true
shell_snapshot = true
apps = true
steer = true
personality = true

[tui]
notifications = true
notification_method = "auto"
notification_condition = "unfocused"
status_line = ["model-with-reasoning", "current-dir", "git-branch", "run-state", "permissions"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.3-codex-spark" = 4
"gpt-5.5" = 4

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]

[mcp_servers.kicad]
command = "node"
args = ["/home/kotek/dev/KiCAD-MCP-Server/dist/index.js"]

[mcp_servers.kicad.env]
NODE_ENV = "production"
PYTHONPATH = "/usr/lib/kicad/lib/python3/dist-packages"
